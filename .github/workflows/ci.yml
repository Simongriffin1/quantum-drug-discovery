name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: benchmarks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry==1.8.3
      - name: Install deps
        run: poetry install
      - name: Ruff
        run: poetry run ruff check peptideforge_benchmarks tests
      - name: Black
        run: poetry run black --check peptideforge_benchmarks tests
      - name: Mypy
        run: poetry run mypy peptideforge_benchmarks
      - name: Pytest (fixtures only, no network)
        run: poetry run pytest

  core:
    runs-on: ubuntu-latest
    needs: benchmarks
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry==1.8.3
      - name: Install deps
        run: poetry install
      - name: Ruff
        run: poetry run ruff check src tests
      - name: Black
        run: poetry run black --check src tests
      - name: Mypy
        run: poetry run mypy src
      - name: Pytest contracts + eval
        run: poetry run pytest -m "contract or eval"
      - name: Install physics extras
        run: poetry run pip install --only-binary=:all: 'openmm>=8.1' 'mlflow>=2.13' 'pyscf>=2.4' 'pennylane>=0.36' || poetry run pip install 'openmm>=8.1' 'mlflow>=2.13' 'pyscf>=2.4' 'pennylane>=0.36'
        continue-on-error: true
      - name: Pytest golden (OpenMM + qchem)
        run: poetry run pytest -m "golden and not slow"
      - name: Export schemas
        run: poetry run python -m peptideforge.contracts.export_schemas

  backend:
    runs-on: ubuntu-latest
    needs: core
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry==1.8.3
      - name: Install deps
        run: poetry install
      - name: Pytest
        run: poetry run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  docker-compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose -f infra/docker-compose.yml config
