repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        files: ^(core|backend)/
        language_version: python3.11

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(core|backend)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.7, types-setuptools]
        files: ^core/src/
        args: [--config-file=core/pyproject.toml]

  - repo: local
    hooks:
      - id: frontend-prettier
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npx --yes prettier@3.3.2 --check "src/**/*.{ts,tsx,css,json}" || true'
        language: system
        files: ^frontend/
        pass_filenames: false
      - id: frontend-eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/
        pass_filenames: false
        stages: [pre-commit]
